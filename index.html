<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Beard — $CHAD Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06100a;
  --green:#00e554;--bright:#00ff5e;--gdim:rgba(0,229,84,.1);--glow:rgba(0,229,84,.25);
  --border:rgba(0,229,84,.12);--border2:rgba(0,229,84,.28);
  --red:#ff3a3a;--gold:#f5c518;--r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#000;color:#fff;font-family:'Manrope',sans-serif;overflow:hidden;}

.screen{display:none;}
.screen.active{display:flex;}

#screen-game{
  height:100vh;
  align-items:center;
  justify-content:center;
  background:var(--bg);
}
.canvas-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 0 60px rgba(0,229,84,.08);}
canvas{display:block;}

/* GAME OVER */
#screen-gameover{
  height:100vh;
  align-items:center;
  justify-content:center;
  padding:24px;
  flex-direction:column;
  gap:0;
  background:var(--bg);
}
.receipt{background:#f4efe4;color:#111;width:310px;border-radius:3px;padding:26px 22px 32px;font-family:'DM Mono',monospace;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.7);flex-shrink:0;}
.receipt::before{content:'';position:absolute;top:-9px;left:0;right:0;height:9px;background:repeating-linear-gradient(90deg,transparent 0,transparent 9px,#f4efe4 9px,#f4efe4 18px);clip-path:polygon(0 100%,3% 0,6% 100%,9% 0,12% 100%,15% 0,18% 100%,21% 0,24% 100%,27% 0,30% 100%,33% 0,36% 100%,39% 0,42% 100%,45% 0,48% 100%,51% 0,54% 100%,57% 0,60% 100%,63% 0,66% 100%,69% 0,72% 100%,75% 0,78% 100%,81% 0,84% 100%,87% 0,90% 100%,93% 0,96% 100%,99% 0,100% 100%);}
.receipt::after{content:'';position:absolute;bottom:-9px;left:0;right:0;height:9px;background:repeating-linear-gradient(90deg,transparent 0,transparent 9px,#f4efe4 9px,#f4efe4 18px);clip-path:polygon(0 0,3% 100%,6% 0,9% 100%,12% 0,15% 100%,18% 0,21% 100%,24% 0,27% 100%,30% 0,33% 100%,36% 0,39% 100%,42% 0,45% 100%,48% 0,51% 100%,54% 0,57% 100%,60% 0,63% 100%,66% 0,69% 100%,72% 0,75% 100%,78% 0,81% 100%,84% 0,87% 100%,90% 0,93% 100%,96% 0,99% 100%,100% 0);}
.r-logo{text-align:center;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:2px;}
.r-sub{text-align:center;font-size:9px;letter-spacing:2px;color:#888;margin-bottom:14px;}
.r-divider{border:none;border-top:1px dashed #c0b89a;margin:10px 0;}
.r-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;color:#555;}
.r-score-lbl{text-align:center;font-size:9px;letter-spacing:3px;color:#999;margin:10px 0 2px;text-transform:uppercase;}
.r-score{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:-1px;color:#111;line-height:1;margin-bottom:2px;}
.r-hs-wrap{display:flex;justify-content:space-between;align-items:baseline;margin:8px 0 0;}
.r-hs-lbl{font-size:9px;letter-spacing:2px;color:#999;text-transform:uppercase;}
.r-hs{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#555;line-height:1;}
.r-hs.new-record{color:#c8920a;text-shadow:0 0 6px rgba(200,146,10,.35);}
.r-record-badge{font-size:8px;letter-spacing:2px;color:#c8920a;text-align:center;margin-top:2px;margin-bottom:2px;text-transform:uppercase;display:none;}
.r-record-badge.show{display:block;}
.r-barcode{text-align:center;margin:12px 0 4px;}
.r-barcode svg{width:150px;height:30px;}
.r-powered{text-align:center;font-size:8px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.go-btns{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;justify-content:center;}
.share-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 20px;background:#000;color:#fff;font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;border:none;border-radius:100px;cursor:pointer;text-decoration:none;transition:all .2s;}
.share-btn:hover{background:#1a1a1a;transform:translateY(-1px);}
.retry-btn{padding:13px 28px;background:var(--green);color:#06100a;font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;border:none;border-radius:100px;cursor:pointer;transition:all .2s;}
.retry-btn:hover{background:var(--bright);box-shadow:0 4px 16px var(--glow);}
</style>
</head>
<body>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen active">
  <div class="canvas-wrap">
    <canvas id="gc"></canvas>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="screen">
  <div class="receipt">
    <div class="r-logo">$CHAD ARCADE</div>
    <div class="r-sub">FLAPPY BEARD</div>
    <hr class="r-divider">
    <div class="r-row"><span>DATE</span><span id="go-date"></span></div>
    <hr class="r-divider">
    <div class="r-score-lbl">YOUR SCORE</div>
    <div class="r-score" id="go-score">0</div>
    <div class="r-hs-wrap">
      <span class="r-hs-lbl">ALL-TIME BEST</span>
      <span class="r-hs" id="go-best">0</span>
    </div>
    <div class="r-record-badge" id="go-record">★ NEW RECORD ★</div>
    <hr class="r-divider">
    <div class="r-barcode">
      <svg viewBox="0 0 150 30"><rect x="0" y="0" width="2" height="24" fill="#222"/><rect x="4" y="0" width="1" height="24" fill="#222"/><rect x="7" y="0" width="3" height="24" fill="#222"/><rect x="12" y="0" width="1" height="24" fill="#222"/><rect x="15" y="0" width="2" height="24" fill="#222"/><rect x="19" y="0" width="4" height="24" fill="#222"/><rect x="25" y="0" width="1" height="24" fill="#222"/><rect x="28" y="0" width="3" height="24" fill="#222"/><rect x="33" y="0" width="2" height="24" fill="#222"/><rect x="37" y="0" width="1" height="24" fill="#222"/><rect x="41" y="0" width="4" height="24" fill="#222"/><rect x="47" y="0" width="2" height="24" fill="#222"/><rect x="51" y="0" width="1" height="24" fill="#222"/><rect x="54" y="0" width="3" height="24" fill="#222"/><rect x="59" y="0" width="2" height="24" fill="#222"/><rect x="63" y="0" width="1" height="24" fill="#222"/><rect x="67" y="0" width="4" height="24" fill="#222"/><rect x="73" y="0" width="2" height="24" fill="#222"/><rect x="77" y="0" width="1" height="24" fill="#222"/><rect x="80" y="0" width="3" height="24" fill="#222"/><rect x="85" y="0" width="2" height="24" fill="#222"/><rect x="89" y="0" width="4" height="24" fill="#222"/><rect x="95" y="0" width="1" height="24" fill="#222"/><rect x="98" y="0" width="3" height="24" fill="#222"/><rect x="103" y="0" width="2" height="24" fill="#222"/><rect x="107" y="0" width="1" height="24" fill="#222"/><rect x="111" y="0" width="4" height="24" fill="#222"/><rect x="117" y="0" width="2" height="24" fill="#222"/><rect x="121" y="0" width="1" height="24" fill="#222"/><rect x="124" y="0" width="3" height="24" fill="#222"/><rect x="129" y="0" width="2" height="24" fill="#222"/><rect x="133" y="0" width="1" height="24" fill="#222"/><rect x="137" y="0" width="4" height="24" fill="#222"/><rect x="143" y="0" width="2" height="24" fill="#222"/><rect x="147" y="0" width="3" height="24" fill="#222"/><text x="75" y="30" text-anchor="middle" font-family="monospace" font-size="7" fill="#888">$CHAD-ARCADE-2026</text></svg>
    </div>
    <div class="r-powered">powered by candle.tv</div>
  </div>
  <div class="go-btns">
    <a class="share-btn" id="go-share" href="#" target="_blank">
      <span style="font-weight:900;font-size:15px;">𝕏</span> Share Score
    </a>
    <button class="retry-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const SITE = 'https://chad-game.vercel.app';
const GW = 420, GH = 560;
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
canvas.width = GW; canvas.height = GH;

// ── HIGH SCORE ──
const HS_KEY = 'chad_flappy_highscore';
function getHighScore(){ return parseInt(localStorage.getItem(HS_KEY)||'0'); }
function saveHighScore(s){ if(s > getHighScore()) localStorage.setItem(HS_KEY, s); }

let raf = null;
let lastTs = 0;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function stopLoop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }

function clearInputs(){
  document.onkeydown = null;
  canvas.onclick = null;
  canvas.ontouchstart = null;
}

function startLoop(){
  lastTs = performance.now();
  function tick(ts){
    const dt = Math.min((ts-lastTs)/16.667, 3);
    lastTs = ts;
    tickFlappy(dt);
    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
}

function restartGame(){
  showScreen('screen-game');
  stopLoop();
  clearInputs();
  initFlappy();
  startLoop();
}

function gameOver(score){
  stopLoop(); clearInputs();
  const prevBest = getHighScore();
  const isRecord = score > prevBest;
  saveHighScore(score);
  const newBest = getHighScore();

  document.getElementById('go-score').textContent = score;
  const hsEl = document.getElementById('go-best');
  hsEl.textContent = newBest;
  hsEl.className = 'r-hs' + (isRecord ? ' new-record' : '');
  const badge = document.getElementById('go-record');
  badge.className = 'r-record-badge' + (isRecord ? ' show' : '');
  document.getElementById('go-date').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();

  const tweet = `Just scored ${score} on Flappy Beard in the $CHAD Arcade 🎮 Can you beat me? Play at ${SITE} $CHAD #CHADArcade`;
  document.getElementById('go-share').href = 'https://twitter.com/intent/tweet?text='+encodeURIComponent(tweet);

  setTimeout(()=>showScreen('screen-gameover'), 700);
}

// ── PARTICLES ──
let parts = [];
function pSpawn(x,y,col,n,spd=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*spd+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,decay:Math.random()*.045+.025,r:Math.random()*3+1,col});
  }
}
function pUpdate(dt){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.13*dt;p.life-=p.decay*dt; if(p.life<=0) parts.splice(i,1); } }
function pDraw(){ parts.forEach(p=>{ ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore(); }); }

// ── SHARED DRAW ──
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#040d07');g.addColorStop(1,'#061208');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle='rgba(0,229,84,.03)';ctx.lineWidth=1;
  for(let x=0;x<GW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GH);ctx.stroke();}
  for(let y=0;y<GH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GW,y);ctx.stroke();}
}

function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawChad(x,y,r,rot){
  ctx.save();ctx.translate(x,y);if(rot)ctx.rotate(rot);
  const hg=ctx.createRadialGradient(-r*.25,-r*.28,r*.08,0,0,r);
  hg.addColorStop(0,'#ffe0a0');hg.addColorStop(1,'#d4a017');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#b8860b';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#06100a';ctx.beginPath();ctx.arc(-r*.36,-r*.22,r*.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*.32,-r*.22,r*.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-r*.28,-r*.30,r*.08,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*.40,-r*.30,r*.08,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.moveTo(0,-r*.05);ctx.lineTo(r*.62,r*.04);ctx.lineTo(0,r*.18);ctx.closePath();ctx.fill();
  ctx.fillStyle='#5a3008';ctx.beginPath();ctx.ellipse(0,r*.64,r*.82,r*.6,0,0,Math.PI);ctx.fill();
  ctx.strokeStyle='#3d1f04';ctx.lineWidth=1.6;ctx.lineCap='round';
  [[-0.45,0.54,-0.36,1.1],[-0.22,0.62,-0.18,1.18],[0,0.66,0,1.2],[0.22,0.62,0.18,1.18],[0.45,0.54,0.36,1.1]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*r,y1*r);ctx.quadraticCurveTo(x1*1.1*r,(y1+y2)/2*r,x2*r,y2*r);ctx.stroke();
  });
  ctx.fillStyle='#6b3a0a';
  ctx.beginPath();ctx.ellipse(-r*.22,r*.22,r*.3,r*.16,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*.22,r*.22,r*.3,r*.16,0.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function makeStars(n){
  return Array.from({length:n},()=>({x:Math.random()*GW,y:Math.random()*GH,r:Math.random()*1.5+.3,a:Math.random()*Math.PI*2,spd:Math.random()*.01+.005}));
}

function drawStars(stars,frame){
  stars.forEach(s=>{
    ctx.save();ctx.globalAlpha=(Math.sin(s.a+frame*s.spd)*.5+.5)*.55+.08;
    ctx.fillStyle='#00ff5e';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

function drawIdleOverlay(title,sub,frame){
  ctx.fillStyle='rgba(6,16,10,.62)';ctx.fillRect(0,0,GW,GH);
  ctx.save();ctx.textAlign='center';
  ctx.font='bold 50px "Bebas Neue",sans-serif';ctx.fillStyle='#00ff5e';ctx.shadowColor='#00ff5e';ctx.shadowBlur=20;
  ctx.fillText(title,GW/2,GH/2-64);ctx.shadowBlur=0;
  ctx.font='400 10px "DM Mono",monospace';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText(sub,GW/2,GH/2-38);
  ctx.globalAlpha=Math.sin(frame*.065)*.4+.6;
  ctx.font='700 13px "DM Mono",monospace';ctx.fillStyle='#00ff5e';
  ctx.fillText('TAP / SPACE TO START',GW/2,GH/2+22);ctx.restore();
}

// Live score — large, centered at top
function drawScore(score){
  ctx.save();ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.font='bold 42px "Bebas Neue",sans-serif';
  ctx.fillText(score,GW/2+2,56);
  ctx.fillStyle='#fff';ctx.fillText(score,GW/2,54);
  ctx.restore();
}

// High score — top right corner
function drawHiScore(hs){
  ctx.save();
  ctx.textAlign='right';
  ctx.font='9px "DM Mono",monospace';
  ctx.fillStyle='rgba(0,229,84,.5)';
  ctx.fillText('BEST',GW-14,20);
  ctx.font='bold 24px "Bebas Neue",sans-serif';
  ctx.fillStyle='rgba(0,229,84,.65)';
  ctx.fillText(hs,GW-14,42);
  ctx.restore();
}

// ══════════════════════════════════════════
// FLAPPY BEARD
// ══════════════════════════════════════════
const FB = {};

function initFlappy(){
  parts=[];
  Object.assign(FB,{
    st:'idle', score:0, frame:0,
    bird:{y:GH/2, vy:0, rot:0},
    pipes:[], pTimer:0, speed:1,
    stars:makeStars(48), flashRed:0
  });
  canvas.onclick=()=>fbFlap();
  canvas.ontouchstart=e=>{e.preventDefault();fbFlap();};
  document.onkeydown=e=>{if(['Space','ArrowUp'].includes(e.code)){e.preventDefault();fbFlap();}};
}

function fbFlap(){
  if(FB.st==='idle'){FB.st='playing';FB.bird.vy=-9.5;}
  else if(FB.st==='playing'){FB.bird.vy=-9.5;pSpawn(82,FB.bird.y,'#00ff5e',5);}
}

function tickFlappy(dt){
  FB.frame++;pUpdate(dt);
  if(FB.flashRed>0) FB.flashRed-=dt;
  if(FB.st!=='playing'){drawFlappy();return;}

  // Speed: smooth ramp. Score 0→1.0, score 10→1.2, score 20→1.4, score 30→1.6+
  FB.speed = 1 + FB.score * 0.02;
  const sp = FB.speed * dt;

  FB.bird.vy+=.46*dt; FB.bird.y+=FB.bird.vy*dt;
  FB.bird.rot=Math.min(Math.PI*.42,Math.max(-.45,FB.bird.vy*.065));
  if(FB.bird.y-22<0){FB.bird.y=22;FB.bird.vy=2;}
  if(FB.bird.y+22>GH-26){fbDie();return;}

  FB.pTimer+=dt;
  // Gap: starts at 200 (~32% wider than old 152), narrows smoothly to 152 by score ~30
  const gap = Math.max(152, 200 - FB.score * 1.6);
  if(FB.pTimer>=88){
    FB.pTimer=0;
    const gapY=75+Math.random()*(GH-gap-110);
    FB.pipes.push({x:GW+62,gapY,gap,scored:false});
  }
  for(let i=FB.pipes.length-1;i>=0;i--){
    const p=FB.pipes[i]; p.x-=2.9*sp;
    if(!p.scored&&p.x+62<82-22){p.scored=true;FB.score++;pSpawn(82,FB.bird.y,'#f5c518',10);}
    if(82+22>p.x+4&&82-22<p.x+62){if(FB.bird.y-22<p.gapY||FB.bird.y+22>p.gapY+p.gap){fbDie();return;}}
    if(p.x+62<-20) FB.pipes.splice(i,1);
  }
  drawFlappy();
}

function fbDie(){
  FB.st='dead'; FB.flashRed=15;
  pSpawn(82,FB.bird.y,'#ff3a3a',20); pSpawn(82,FB.bird.y,'#f5c518',10);
  gameOver(FB.score);
}

function drawFlappy(){
  drawBg(); drawStars(FB.stars,FB.frame);
  FB.pipes.forEach(p=>drawJeetPipe(p.x,p.gapY,p.gap));
  ctx.fillStyle='#0a2010'; ctx.fillRect(0,GH-26,GW,26);
  ctx.strokeStyle='rgba(0,229,84,.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,GH-26); ctx.lineTo(GW,GH-26); ctx.stroke();
  pDraw(); drawChad(82,FB.bird.y,22,FB.bird.rot);

  if(FB.st==='idle') drawIdleOverlay('FLAPPY BEARD','CANDLE TV EDITION',FB.frame);
  if(FB.st!=='idle') drawScore(FB.score);

  // Always show best if > 0 (draws on top of idle overlay too)
  const hs = getHighScore();
  if(hs > 0) drawHiScore(hs);

  if(FB.flashRed>0){ctx.fillStyle=`rgba(255,0,0,${Math.min(.6,FB.flashRed/8)})`;ctx.fillRect(0,0,GW,GH);}
  if(FB.st==='dead'&&FB.flashRed>5){
    ctx.save();ctx.textAlign='center';ctx.font='bold 80px "Bebas Neue",sans-serif';
    ctx.fillStyle='#ff3a3a';ctx.shadowColor='#ff3a3a';ctx.shadowBlur=30;ctx.fillText('REKT',GW/2,GH/2);ctx.restore();
  }
}

function drawJeetPipe(x,gapY,gap){
  const w=62;
  drawCoinStack(x,0,w,gapY);
  drawCoinStack(x,gapY+gap,w,GH-(gapY+gap)-26);
  ctx.save();ctx.textAlign='center';ctx.font='bold 10px "DM Mono",monospace';ctx.fillStyle='#ff4444';
  if(gapY>14) ctx.fillText('JEET',x+w/2,gapY-6);
  ctx.fillText('JEET',x+w/2,gapY+gap+14);ctx.restore();
}

function drawCoinStack(x,y,w,h){
  if(h<=0)return;
  const grad=ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#1a1200');grad.addColorStop(.3,'#4a3200');grad.addColorStop(.5,'#f5c518');grad.addColorStop(.7,'#4a3200');grad.addColorStop(1,'#1a1200');
  ctx.fillStyle=grad;ctx.fillRect(x,y,w,h);
  const cH=15;
  for(let cy=y;cy<y+h;cy+=cH){
    const rh=Math.min(cH-2,y+h-cy);
    const rg=ctx.createLinearGradient(x,0,x+w,0);
    rg.addColorStop(0,'#6a4c00');rg.addColorStop(.25,'#c8a000');rg.addColorStop(.5,'#f5c518');rg.addColorStop(.75,'#c8a000');rg.addColorStop(1,'#6a4c00');
    ctx.fillStyle=rg;ctx.fillRect(x+2,cy,w-4,rh);
    ctx.fillStyle='rgba(255,255,255,.13)';ctx.fillRect(x+6,cy+1,w-20,3);
    if((cy-y)%30<15){ctx.save();ctx.fillStyle='rgba(100,65,0,.7)';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText('$',x+w/2,cy+rh-2);ctx.restore();}
  }
  ctx.strokeStyle='rgba(245,197,24,.35)';ctx.lineWidth=1.5;ctx.strokeRect(x+.75,y+.75,w-1.5,h-1.5);
}

// ── BOOT ──
initFlappy();
startLoop();
</script>
